<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />

    <!-- PWA Icons (cache buster ?v=17 forces browsers to refetch) -->

    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=17" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=17" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png?v=17" />
    <link rel="shortcut icon" href="/favicon.ico?v=17" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=17" />
    <link rel="manifest" href="/manifest.json?v=17" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="AthletiGo" />
    <meta name="theme-color" content="#FF6F20" />

    <!-- Open Graph (social sharing previews) -->
    <meta property="og:title" content="AthletiGo — אפליקציית אימונים" />
    <meta property="og:description" content="ניהול מתאמנים, תוכניות אימון, מעקב התקדמות ושעוני אימון מבוססי מיומנות" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://athletigo-coach.com" />
    <meta property="og:locale" content="he_IL" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AthletiGo — אפליקציית אימונים" />
    <meta name="twitter:description" content="ניהול מתאמנים, תוכניות אימון, מעקב התקדמות ושעוני אימון מבוססי מיומנות" />
    <meta name="twitter:image" content="/icon-512.png" />
    <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) { registration.unregister(); }
      });
      caches.keys().then(function(names) {
        for (let name of names) caches.delete(name);
      });
    }
    </script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Prevent pinch zoom only — allow normal scrolling -->
    <script>
      document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
      document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
      document.addEventListener('touchmove', function(e) { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
