<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AthletiGo — אפליקציית אימונים</title>
    <meta name="description" content="ניהול מתאמנים, תוכניות אימון, מעקב התקדמות ושעוני אימון מבוססי מיומנות" />

    <!-- PWA Icons (cache buster ?v=23 forces browsers to refetch) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=23" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=23" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=23" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png?v=23" />
    <link rel="shortcut icon" href="/favicon.ico?v=23" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=23" />
    <link rel="manifest" href="/manifest.json?v=23" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="AthletiGo" />
    <meta name="theme-color" content="#FF6F20" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph (social sharing previews) -->
    <meta property="og:title" content="AthletiGo — אפליקציית אימונים" />
    <meta property="og:description" content="ניהול מתאמנים, תוכניות אימון, מעקב התקדמות ושעוני אימון מבוססי מיומנות" />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://athletigo-coach.com" />
    <meta property="og:locale" content="he_IL" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AthletiGo — אפליקציית אימונים" />
    <meta name="twitter:description" content="ניהול מתאמנים, תוכניות אימון, מעקב התקדמות ושעוני אימון מבוססי מיומנות" />
    <meta name="twitter:image" content="/icon-512.png" />
    <!-- Unconditional SW + cache kill on every load. Heavy-handed but
         this is the loop-breaker: any stale Workbox cache that was
         serving an old chunk graph gets nuked before the new bundle
         even tries to load. Runs FIRST in <head>, before fonts/PWA
         registration scripts. -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          for (var i = 0; i < regs.length; i++) {
            regs[i].unregister();
            console.log('[SW] Unregistered service worker:', regs[i].scope);
          }
        });
      }
      if (typeof caches !== 'undefined') {
        caches.keys().then(function (names) {
          for (var i = 0; i < names.length; i++) {
            caches.delete(names[i]);
            console.log('[SW] Deleted cache:', names[i]);
          }
        });
      }
    </script>

    <!-- Fonts: Rubik (body, primary) + Bebas Neue (display accent for the wordmark + large numerics) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Prevent pinch zoom only — allow normal scrolling -->
    <script>
      document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
      document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
      document.addEventListener('touchmove', function(e) { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
    </script>

    <!-- Cream paint BEFORE any JS/CSS loads — kills the white flash
         on cold load. Mirrors the boot splash + PageLoader background
         (#FFF9F0). -->
    <style>
      html, body {
        background-color: #FFF9F0 !important;
        margin: 0;
        padding: 0;
      }
      #root {
        background-color: #FFF9F0;
      }
    </style>

    <!-- Keyframes — `loading-bar` for InlineLoader. Lives in
         index.html so animations are available before React + Vite
         inject CSS modules. -->
    <style>
      @keyframes loading-bar {
        0%   { transform: translateX(-150%); }
        100% { transform: translateX(300%); }
      }
    </style>
  </head>
  <body style="margin:0;padding:0;background:#FFF9F0;">
    <!-- Pre-React splash — paints the same cream + black logo + orange
         bar that PageLoader.jsx shows, so the cold-load handoff into
         React is invisible. Removed on window.load. -->
    <div id="pre-loader" style="
      position: fixed;
      inset: 0;
      background: #FFF9F0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      gap: 24px;
    ">
      <img
        src="/logoR-black.png"
        alt="AthletiGo"
        style="width: 180px; height: auto; opacity: 0.9;"
        onerror="this.style.display='none'"
      />
      <div style="
        width: 200px;
        height: 4px;
        background: #F0E4D0;
        border-radius: 2px;
        overflow: hidden;
      ">
        <div id="pre-loader-bar" style="
          height: 100%;
          width: 0%;
          background: #FF6F20;
          border-radius: 2px;
          transition: width 0.3s ease;
        "></div>
      </div>
    </div>

    <script>
      (function () {
        var bar = document.getElementById('pre-loader-bar');
        var loader = document.getElementById('pre-loader');
        var progress = 0;
        var interval = setInterval(function () {
          progress += Math.random() * 15;
          if (progress > 85) progress = 85;
          if (bar) bar.style.width = progress + '%';
        }, 200);

        window.addEventListener('load', function () {
          clearInterval(interval);
          if (bar) bar.style.width = '100%';
          setTimeout(function () {
            if (loader) {
              loader.style.opacity = '0';
              loader.style.transition = 'opacity 0.3s ease';
              setTimeout(function () {
                if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
              }, 300);
            }
          }, 300);
        });
      })();
    </script>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
