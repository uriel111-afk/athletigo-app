<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AthletiGo — אפליקציית אימונים</title>
    <meta name="description" content="ניהול מתאמנים, תוכניות אימון, מעקב התקדמות ושעוני אימון מבוססי מיומנות" />

    <!-- PWA Icons (cache buster ?v=23 forces browsers to refetch) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=23" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=23" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=23" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png?v=23" />
    <link rel="shortcut icon" href="/favicon.ico?v=23" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=23" />
    <link rel="manifest" href="/manifest.json?v=23" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="AthletiGo" />
    <meta name="theme-color" content="#FF6F20" />

    <!-- Open Graph (social sharing previews) -->
    <meta property="og:title" content="AthletiGo — אפליקציית אימונים" />
    <meta property="og:description" content="ניהול מתאמנים, תוכניות אימון, מעקב התקדמות ושעוני אימון מבוססי מיומנות" />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://athletigo-coach.com" />
    <meta property="og:locale" content="he_IL" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AthletiGo — אפליקציית אימונים" />
    <meta name="twitter:description" content="ניהול מתאמנים, תוכניות אימון, מעקב התקדמות ושעוני אימון מבוססי מיומנות" />
    <meta name="twitter:image" content="/icon-512.png" />
    <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) { registration.unregister(); }
      });
      caches.keys().then(function(names) {
        for (let name of names) caches.delete(name);
      });
    }
    </script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Prevent pinch zoom only — allow normal scrolling -->
    <script>
      document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
      document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
      document.addEventListener('touchmove', function(e) { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
    </script>
  </head>
  <body style="margin:0;padding:0;background:#FDF8F3;">
    <div id="root"></div>

    <!-- Branded boot splash — sits OUTSIDE #root so React's first
         render doesn't blow it away. main.jsx finishes the bar to
         100% and fades it out once the app has painted. -->
    <div id="splash" style="
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: #FDF8F3;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 99999;
      transition: opacity 0.4s ease;
      font-family: 'Barlow', 'Heebo', 'Assistant', sans-serif;
    ">
      <img src="/logo-transparent.png" alt="AthletiGo"
           style="width: 80px; height: 80px; margin-bottom: 16px; object-fit: contain;"
           onerror="this.style.display='none'" />
      <div style="
        font-size: 24px; font-weight: 700; color: #1A1A1A;
        letter-spacing: 0.15em; margin-bottom: 24px;
      ">ATHLETIGO</div>
      <div style="
        width: 200px; height: 3px;
        background: #F0E4D0; border-radius: 2px;
        overflow: hidden;
      ">
        <div id="splash-bar" style="
          height: 100%; width: 0%;
          background: #FF6F20; border-radius: 2px;
          transition: width 0.3s ease;
        "></div>
      </div>
    </div>
    <script>
      (function () {
        var bar = document.getElementById('splash-bar');
        if (!bar) return;
        // Stage the bar so the user sees motion while React boots.
        // main.jsx finishes the run with 100% + fade-out as soon as
        // the app's first commit lands.
        setTimeout(function () { bar.style.width = '30%'; }, 100);
        setTimeout(function () { bar.style.width = '60%'; }, 400);
        setTimeout(function () { bar.style.width = '85%'; }, 800);
      })();
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
