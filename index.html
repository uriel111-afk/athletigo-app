<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <!-- Instant cream cover — paints before browser fetches/decodes
         anything else. Sits above all content for ~100ms to mask the
         PWA splash handoff, then fades. -->
    <style>
      html { background: #FFFFFF !important; }
      body {
        background: #FFFFFF !important;
        margin: 0;
        padding: 0;
      }
      #instant-cover {
        position: fixed;
        inset: 0;
        background: #FFFFFF;
        z-index: 999999;
      }
    </style>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AthletiGo — אפליקציית אימונים</title>
    <meta name="description" content="ניהול מתאמנים, תוכניות אימון, מעקב התקדמות ושעוני אימון מבוססי מיומנות" />

    <!-- PWA Icons (cache buster forces browsers to refetch the recoloured set) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=2" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=2" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png?v=2" />
    <link rel="shortcut icon" href="/favicon.ico?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
    <!-- Manifest is auto-injected by vite-plugin-pwa as /manifest.webmanifest.
         The legacy public/manifest.json had empty " " name/short_name which
         failed Chrome's installability check; do not link it here. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="AthletiGo" />
    <meta name="theme-color" content="#FFFFFF" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph (social sharing previews) -->
    <meta property="og:title" content="AthletiGo — אפליקציית אימונים" />
    <meta property="og:description" content="ניהול מתאמנים, תוכניות אימון, מעקב התקדמות ושעוני אימון מבוססי מיומנות" />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://athletigo-coach.com" />
    <meta property="og:locale" content="he_IL" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AthletiGo — אפליקציית אימונים" />
    <meta name="twitter:description" content="ניהול מתאמנים, תוכניות אימון, מעקב התקדמות ושעוני אימון מבוססי מיומנות" />
    <meta name="twitter:image" content="/icon-512.png" />
    <!-- Manual SW + cache reset escape hatch. Only runs when the URL
         carries ?sw-reset (any value), so normal loads keep the SW
         alive — required for Chrome's PWA install prompt to fire. To
         nuke a stuck install: visit athletigo-coach.com/?sw-reset
         once. -->
    <script>
      if (window.location.search.indexOf('sw-reset') !== -1) {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            for (var i = 0; i < regs.length; i++) {
              regs[i].unregister();
            }
          });
        }
        if (typeof caches !== 'undefined') {
          caches.keys().then(function (names) {
            for (var i = 0; i < names.length; i++) {
              caches.delete(names[i]);
            }
          });
        }
        console.log('[SW] Manual reset ran via ?sw-reset');
      }
    </script>

    <!-- PWA install — capture beforeinstallprompt as early as possible
         so it isn't lost if React mounts after the event fires (BFCache
         restores, slow cold loads). The deferred event is stashed on
         window.__deferredInstallPrompt and a custom 'pwa-install-available'
         event is dispatched so any consumer mounting later can pick it up.
         'appinstalled' clears the stash. -->
    <script>
      window.__deferredInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        window.__deferredInstallPrompt = e;
        window.dispatchEvent(new Event('pwa-install-available'));
      });
      window.addEventListener('appinstalled', function () {
        window.__deferredInstallPrompt = null;
        window.dispatchEvent(new Event('pwa-installed'));
      });
    </script>

    <!-- Fonts: Rubik (body, primary) + Bebas Neue (display accent for the wordmark + large numerics) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Prevent pinch zoom only — allow normal scrolling -->
    <script>
      document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
      document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
      document.addEventListener('touchmove', function(e) { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
    </script>

    <!-- Cream paint BEFORE any JS/CSS loads — kills the white flash
         on cold load. Mirrors the boot splash + PageLoader background
         (#FFFFFF). -->
    <style>
      html, body {
        background-color: #FFFFFF !important;
        margin: 0;
        padding: 0;
      }
      #root {
        background-color: #FFFFFF;
      }
    </style>

    <!-- Keyframes — `loading-bar` for InlineLoader. Lives in
         index.html so animations are available before React + Vite
         inject CSS modules. -->
    <style>
      @keyframes loading-bar {
        0%   { transform: translateX(-150%); }
        100% { transform: translateX(300%); }
      }
    </style>
  </head>
  <body style="margin:0;padding:0;background:#FFFFFF;">
    <div id="instant-cover"></div>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var cover = document.getElementById('instant-cover');
        if (cover) {
          setTimeout(function() {
            cover.style.transition = 'opacity 0.2s ease';
            cover.style.opacity = '0';
            setTimeout(function() {
              if (cover.parentNode) cover.parentNode.removeChild(cover);
            }, 200);
          }, 100);
        }
      });
    </script>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
